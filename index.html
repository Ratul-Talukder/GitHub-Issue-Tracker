<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in</title>

    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Tailwind + DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>

  <body class="min-h-screen flex items-center justify-center bg-gray-50">
    <div
      class="w-full max-w-md bg-white p-8 flex flex-col items-center shadow-lg rounded-xl"
    >
      <!-- Logo Section -->
      <div class="w-full flex flex-col items-center mb-4">
        <img src="./assets/github-logo.png" class="my-6 w-14" />
        <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
      </div>

      <!-- Login Form -->
      <fieldset class="w-full fieldset rounded-box">
        <label class="label font-semibold text-[16px] text-black">
          Username
        </label>

        <input
          id="username"
          type="text"
          class="input w-full"
          placeholder="Enter Username"
        />

        <label class="label font-semibold text-[16px] text-black mt-3">
          Password
        </label>

        <input
          id="password"
          type="password"
          class="input w-full"
          placeholder="Enter Password"
        />

        <!-- Login Button -->
        <button id="loginBtn" class="btn btn-primary mt-4 w-full">
          Sign In
        </button>

        <!-- Error Message -->
        <p id="errorMsg" class="text-red-500 mt-2 hidden text-sm">
          Invalid username or password
        </p>
      </fieldset>

      <!-- OR Divider -->
      <div class="flex items-center w-full my-6">
        <hr class="flex-1 border-gray-300" />
        <span class="mx-2 text-gray-500">OR</span>
        <hr class="flex-1 border-gray-300" />
      </div>

      <!-- Demo Credentials -->
      <div class="w-full text-center">
        <h2 class="text-[#64748B] mb-2">Demo Credentials:</h2>

        <div class="px-8 py-4 bg-[#f1f2f3] rounded-lg">
          <p><span class="font-semibold text-[16px]">Username:</span> admin</p>

          <p>
            <span class="font-semibold text-[16px]">Password:</span> admin123
          </p>
        </div>
      </div>
    </div>

    <!-- Login JS -->
    <script src="./script/login.js"></script>
  </body>
</html>
