<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <!-- Tailwind and DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font-Awesome-CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="min-h-screen flex items-center justify-center">
    <div
      class="w-1/3 mx-auto  p-8 flex flex-col items-center shadow-lg"
    >
      <!-- Image Div -->
      <div class="w-11/12 flex flex-col justify-center items-center mb-4">
        <img src="./assets/github-logo.png" class="my-6" />
        <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
      </div>

      <!-- Sign In form -->
      <fieldset class="w-11/12 fieldset rounded-box">
        <label class="label font-semibold text-[16px] text-black"
          >Username</label
        >
        <input type="email" class="input w-full" placeholder="Enter Username" />

        <label class="label font-semibold text-[16px] text-black"
          >Password</label
        >
        <input
          type="password"
          class="input w-full"
          placeholder="Enter Password"
        />
        <a href="./main.html" class="btn btn-primary mt-4">Sign In</a>
        
      </fieldset>

      <!-- OR -->
      <div class="flex items-center w-11/12 my-6">
        <hr class="flex-1 border-gray-300" />
        <span class="mx-2 text-gray-500">OR</span>
        <hr class="flex-1 border-gray-300" />
      </div>

      <!-- Demo Credentials -->
       <div class="w-11/12 text-center">
        <h2 class="text-[#64748B]">Demo Credentials:</h2>
        <div class=" px-8 py-4 bg-[#f1f2f3]">
          <p><span class="font-semibold text-[16px]">Username:</span> admin</p>
          <p><span class="font-semibold text-[16px]">Password:</span> admin123</p>
        </div>
       </div>
    </div>
  </body>
</html>
